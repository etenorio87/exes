<form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
  <h2 class="text-xl font-semibold">{{ 'auth.login.title' | translate }}</h2>

  <div class="flex flex-col gap-1">
    <label for="login-email">{{ 'auth.fields.email' | translate }}</label>
    <input pInputText id="login-email" type="email" formControlName="email" autocomplete="email" />
  </div>

  <div class="flex flex-col gap-1">
    <label for="login-password">{{ 'auth.fields.password' | translate }}</label>
    <p-password
      inputId="login-password"
      formControlName="password"
      [feedback]="false"
      [toggleMask]="true"
      autocomplete="current-password"
      styleClass="w-full"
      [inputStyle]="{ width: '100%' }"
    />
  </div>

  @if (error(); as msg) {
    <p-message severity="error" [text]="msg" />
  }

  <p-button
    type="submit"
    [label]="'auth.login.submit' | translate"
    [loading]="submitting()"
    [disabled]="form.invalid"
    styleClass="w-full"
  />

  <div class="flex justify-between text-sm pt-2">
    <a [routerLink]="['/auth/recover']" class="text-primary-600 hover:underline">
      {{ 'auth.login.forgot' | translate }}
    </a>
    <a [routerLink]="['/auth/register']" class="text-primary-600 hover:underline">
      {{ 'auth.login.noAccount' | translate }}
    </a>
  </div>
</form>
