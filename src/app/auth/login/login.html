<form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
  <h2 class="text-xl font-semibold">{{ 'auth.login.title' | translate }}</h2>

  <p-button
    type="button"
    [label]="'auth.login.google' | translate"
    class="w-full"
    severity="secondary"
    [loading]="googleLoading()"
    (onClick)="signInWithGoogle()"
  >
    <ng-template #icon>
      @if (!googleLoading()) {
        <svg class="w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
      }
    </ng-template>
  </p-button>

  <div class="flex items-center gap-3 text-surface-400 text-sm">
    <span class="flex-1 border-t border-surface-200 dark:border-surface-700"></span>
    {{ 'auth.orEmail' | translate }}
    <span class="flex-1 border-t border-surface-200 dark:border-surface-700"></span>
  </div>

  <div class="flex flex-col gap-1">
    <label for="login-email">{{ 'auth.fields.email' | translate }}</label>
    <input pInputText id="login-email" type="email" formControlName="email" autocomplete="email" />
  </div>

  <div class="flex flex-col gap-1">
    <label for="login-password">{{ 'auth.fields.password' | translate }}</label>
    <p-password
      inputId="login-password"
      formControlName="password"
      [feedback]="false"
      [toggleMask]="true"
      autocomplete="current-password"
      styleClass="w-full"
      [inputStyle]="{ width: '100%' }"
    />
  </div>

  @if (error(); as msg) {
    <p-message severity="error" [text]="msg" />
  }

  <p-button
    type="submit"
    [label]="'auth.login.submit' | translate"
    [loading]="submitting()"
    [disabled]="form.invalid"
    styleClass="w-full"
  />

  <div class="flex justify-between text-sm pt-2">
    <a [routerLink]="['/auth/recover']" class="text-primary-600 hover:underline">
      {{ 'auth.login.forgot' | translate }}
    </a>
    <a [routerLink]="['/auth/register']" class="text-primary-600 hover:underline">
      {{ 'auth.login.noAccount' | translate }}
    </a>
  </div>
</form>
