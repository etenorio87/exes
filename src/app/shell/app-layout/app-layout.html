<div class="min-h-screen flex flex-col bg-surface-50 dark:bg-surface-950">
  <!-- Header -->
  <header
    class="flex items-center justify-between px-4 h-14 border-b border-surface-200 dark:border-surface-800 bg-white dark:bg-surface-900"
  >
    <div class="flex items-center gap-3">
      <button
        type="button"
        class="md:hidden p-2 rounded hover:bg-surface-100 dark:hover:bg-surface-800"
        (click)="toggleMobileSidebar()"
        data-testid="mobile-menu-trigger"
        [attr.aria-label]="'shell.openMenu' | translate"
      >
        <i class="pi pi-bars text-xl"></i>
      </button>
      <a routerLink="/app/dashboard" class="text-xl font-bold text-primary-600">
        {{ 'app.title' | translate }}
      </a>
    </div>

    <div>
      <button
        type="button"
        class="flex items-center gap-2 p-1 rounded hover:bg-surface-100 dark:hover:bg-surface-800"
        (click)="userMenu.toggle($event)"
        data-testid="user-menu-trigger"
        [attr.aria-label]="'shell.userMenu.label' | translate"
      >
        <p-avatar [label]="userInitial()" shape="circle" />
      </button>
      <p-menu #userMenu [model]="userMenuItems()" [popup]="true" appendTo="body" />
    </div>
  </header>

  <div class="flex flex-1 overflow-hidden">
    <!-- Desktop sidebar -->
    <aside
      class="hidden md:flex flex-col w-60 border-r border-surface-200 dark:border-surface-800 bg-white dark:bg-surface-900 p-3 gap-1"
      data-testid="sidebar-desktop"
    >
      @for (item of navItems; track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="bg-primary-100 text-primary-700 dark:bg-primary-900 dark:text-primary-200"
          class="flex items-center gap-3 px-3 py-2 rounded text-surface-700 dark:text-surface-300 hover:bg-surface-100 dark:hover:bg-surface-800"
        >
          <i [class]="item.icon"></i>
          <span>{{ item.labelKey | translate }}</span>
        </a>
      }
    </aside>

    <!-- Mobile drawer -->
    <p-drawer
      [visible]="mobileSidebarOpen()"
      (visibleChange)="mobileSidebarOpen.set($event)"
      position="left"
      [modal]="true"
      [showCloseIcon]="true"
      styleClass="w-72"
      [header]="'app.title' | translate"
    >
      <div class="flex flex-col gap-1">
        @for (item of navItems; track item.path) {
          <a
            [routerLink]="item.path"
            routerLinkActive="bg-primary-100 text-primary-700"
            class="flex items-center gap-3 px-3 py-2 rounded text-surface-700 hover:bg-surface-100"
            (click)="closeMobileSidebar()"
          >
            <i [class]="item.icon"></i>
            <span>{{ item.labelKey | translate }}</span>
          </a>
        }
      </div>
    </p-drawer>

    <!-- Main content -->
    <main class="flex-1 overflow-y-auto p-4 md:p-6">
      <router-outlet />
    </main>
  </div>

  <p-toast position="bottom-right" />
  <p-confirmdialog />
</div>
