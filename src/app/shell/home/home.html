<div class="min-h-screen flex items-center justify-center bg-surface-50 dark:bg-surface-950 p-4">
  <div class="w-full max-w-md">
    <p-card>
      <div class="flex flex-col gap-4">
        <h1 class="text-2xl font-bold">{{ 'shell.home.title' | translate }}</h1>
        @if (user(); as u) {
          <p class="text-surface-700 dark:text-surface-300">
            {{ 'shell.home.signedInAs' | translate }} <strong>{{ u.email }}</strong>
          </p>
        }
        <p-button
          [label]="'shell.home.signOut' | translate"
          severity="secondary"
          [loading]="signingOut()"
          (onClick)="signOut()"
        />
      </div>
    </p-card>
  </div>
</div>
