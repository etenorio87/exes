<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>EXES</title>
    <script>
      // GitHub Pages SPA redirect: forward deep links to index.html
      const path = window.location.pathname.replace('/exes', '') || '/';
      const search = window.location.search;
      const hash = window.location.hash;
      sessionStorage.setItem('spa-redirect', path + search + hash);
      window.location.replace('/exes/');
    </script>
  </head>
  <body></body>
</html>
